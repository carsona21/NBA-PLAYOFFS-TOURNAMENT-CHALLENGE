<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NBA Playoffs Challenge Live Totals</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero live-hero">
        <div>
          <div class="hero-brand">
            <img src="./nba-badge.svg" alt="NBA badge" class="hero-logo">
          </div>
          <p class="eyebrow">Live Totals</p>
          <h1>Playoff Leaderboard</h1>
          <p class="hero-copy">
            This page is the live scoring board for the bet. Team points and Finals bonuses are combined here.
          </p>
        </div>
        <div class="identity-card">
          <p class="identity-label">Current view</p>
          <strong>Live Totals Page</strong>
          <p class="section-note" id="live-last-updated">Loading saved game...</p>
          <a class="secondary-link" href="./index.html?control=1">Open Draft Control Page</a>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Standings</p>
              <h2>Total Points</h2>
            </div>
          </div>
          <div id="live-leaderboard" class="leaderboard-grid"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Draft Results</p>
              <h2>Everyone's Teams</h2>
            </div>
          </div>
          <div id="live-player-boards" class="player-boards"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Scoring</p>
              <h2>Team Totals</h2>
            </div>
          </div>
          <div id="live-team-grid" class="teams-grid"></div>
        </section>
      </main>
    </div>

    <template id="live-leaderboard-card-template">
      <article class="leader-card">
        <p class="placement"></p>
        <h3></h3>
        <p class="score-line"></p>
        <p class="meta-line"></p>
      </article>
    </template>

    <script src="./live.js"></script>
  </body>
</html>
